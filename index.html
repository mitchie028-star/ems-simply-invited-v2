<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Em's Simply Invited</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1b1b1b, #000);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    /* subtle floating glow */
    body::before {
      content: "";
      position: absolute;
      width: 600px;
      height: 600px;
      background: rgba(255, 215, 0, 0.08);
      filter: blur(120px);
      top: -100px;
      left: -100px;
      animation: floatGlow 8s ease-in-out infinite alternate;
    }

    @keyframes floatGlow {
      from { transform: translate(0,0); }
      to { transform: translate(40px, 60px); }
    }

    .container {
      text-align: center;
      z-index: 2;
      max-width: 650px;
      padding: 20px;
      animation: fadeIn 1.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 2.8rem;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    p {
      opacity: 0.6;
      margin-bottom: 40px;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    a {
      display: block;
      padding: 18px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      color: white;
      text-decoration: none;
      font-size: 1.1rem;
      transition: 0.3s ease;
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
    }

    a:hover {
      background: rgba(255,255,255,0.12);
      transform: scale(1.03);
      border-color: rgba(255, 215, 0, 0.4);
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.15);
    }

    .emoji {
      font-size: 1.3rem;
      margin-right: 8px;
    }

    footer {
      margin-top: 40px;
      font-size: 0.8rem;
      opacity: 0.4;
    }
  </style>

</head>

<body>

  <div class="container">

    <h1>Em's Simply Invited</h1>
    <p>Choose a cinematic invitation experience</p>

    <div class="cards">

      <a href="/safari/">
        <span class="emoji">🐘</span> Safari Adventure Invitation
      </a>

      <a href="/princess/">
        <span class="emoji">👑</span> Princess Peach Invitation
      </a>

    </div>

    <footer>
      Crafted with cinematic storytelling ✨
    </footer>

  </div>

</body>
</html>
