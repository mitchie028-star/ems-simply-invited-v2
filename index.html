<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Safari Adventure Invitation</title>

  <link rel="stylesheet" href="style.css">

</head>

<body class="safari">

  <!-- =========================
       CINEMATIC BACKGROUND
  ========================== -->

  <div class="safari-bg"></div>
  <div class="safari-overlay"></div>

  <!-- =========================
       SCREEN 1 - INTRO
  ========================== -->

  <section class="safari-screen intro active">

    <h1 class="safari-title">
      A Wild Adventure Awaits...
    </h1>

  </section>

  <!-- =========================
       SCREEN 2 - HERO BABY
  ========================== -->

  <section class="safari-screen hero">

    <div class="safari-animals">

      <img src="/assets/monkey.png" class="animal monkey" />
      <img src="/assets/giraffe.png" class="animal giraffe" />
      <img src="/assets/lion.png" class="animal lion" />
      <img src="/assets/elephant.png" class="animal elephant" />
      <img src="/assets/parrot.png" class="animal parrot" />

    </div>

    <div class="safari-center">

      <img src="/assets/baby.png" class="safari-baby" />

      <h2 class="safari-text">
        Our Little Explorer<br>
        is Turning ONE!
      </h2>

      <button class="safari-btn">
        Join The Adventure →
      </button>

    </div>

  </section>

  <!-- =========================
       SCREEN 3 - JOURNAL
  ========================== -->

  <section class="safari-screen journal">

    <div class="journal-book"></div>

    <h2 class="journal-text">
      YOU’RE INVITED
    </h2>

  </section>

  <!-- =========================
       SCREEN 4 - DETAILS
  ========================== -->

  <section class="safari-screen details">

    <h2 class="safari-heading">Safari Adventure</h2>

    <div class="details-card">

      <p>Saturday</p>
      <p>June 25, 2026</p>
      <p>2:00 PM</p>
      <p>The Blue Leaf Events Pavilion</p>

    </div>

  </section>

  <!-- =========================
       SCREEN 5 - MAP
  ========================== -->

  <section class="safari-screen map">

    <h2 class="safari-heading">Adventure Map</h2>

    <div class="map-flow">
      <p>🏠 Start</p>
      <p>↓</p>
      <p>🦁 Jungle Trail</p>
      <p>↓</p>
      <p>📍 Party Venue</p>
    </div>

  </section>

  <!-- =========================
       SCREEN 6 - RSVP
  ========================== -->

  <section class="safari-screen rsvp">

    <h2 class="safari-heading">RSVP</h2>

    <form class="rsvp-form">

      <input type="text" placeholder="Name" />
      <input type="number" placeholder="Guests" />
      <textarea placeholder="Message"></textarea>

      <button type="button">
        Count Me In!
      </button>

    </form>

  </section>

  <script src="script.js"></script>

</body>
</html>
