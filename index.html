<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Em's Simply Invited</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0b0b0b, #1a1a1a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.7;
      margin-bottom: 40px;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    a {
      display: block;
      padding: 15px;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      color: white;
      text-decoration: none;
      font-size: 1.2rem;
      transition: 0.3s;
    }

    a:hover {
      background: rgba(255,255,255,0.2);
      transform: scale(1.03);
    }
  </style>

</head>

<body>

  <div class="container">

    <h1>Em's Simply Invited</h1>
    <p>Choose a magical invitation experience</p>

    <div class="cards">

      <a href="/safari/">
        🐘 Safari Adventure Invitation
      </a>

      <a href="/princess/">
        👑 Princess Peach Invitation
      </a>

    </div>

  </div>

</body>
</html>
