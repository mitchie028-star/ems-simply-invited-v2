<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Princess Aiofee Invitation</title>

  <!-- Mario Font -->
  <link href="https://fonts.cdnfonts.com/css/new-super-mario-font-u" rel="stylesheet">

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <!-- PRESS START SCREEN -->
  <div id="startScreen">
    <h1>PRESS START</h1>
  </div>

  <!-- BACKGROUND VIDEO -->
  <video id="bgVideo" autoplay muted loop playsinline>
    <source src="assets/Intro.mp4" type="video/mp4">
  </video>

  <!-- DARK OVERLAY -->
  <div class="overlay"></div>

  <!-- SOUND -->
  <audio id="coinSound" src="assets/coin.mp3" preload="auto"></audio>

  <!-- HERO -->
  <header class="hero">

    <img src="assets/mybirthday.png" class="hero-sticker" />

    <h1 class="mario-title">
      Princess Aiofee is turning 7
    </h1>

    <p class="hero-text">
      Another castle? Nope, just another amazing level-up! Aiofee is turning 7 and we are throwing a Super Mario celebration. Join us as we jump into the fun, grab some power-ups, and defeat the boredom. Let’s-a-go!
    </p>

  </header>

</body>

<script src="script.js"></script>

</html>
