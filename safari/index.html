<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Safari Invite</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="safari">

  <div class="bg"></div>
  <div class="overlay"></div>

  <!-- SCENE 1 -->
  <div class="scene active" id="scene1">
    <h1>A Wild Adventure Awaits...</h1>
    <p>Tap anywhere to continue</p>
  </div>

  <!-- SCENE 2 -->
  <div class="scene" id="scene2">
    <img src="/assets/boy.png" class="baby">
    <h2>Meet the Explorer</h2>
  </div>

  <!-- SCENE 3 -->
  <div class="scene" id="scene3">
    <h2>Safari Friends</h2>
    <div class="animals">
      <img src="/assets/monkey.png">
      <img src="/assets/lion.png">
      <img src="/assets/girraffe.png">
      <img src="/assets/elephant.png">
      <img src="/assets/parrot.png">
    </div>
  </div>

  <!-- SCENE 4 -->
  <div class="scene" id="scene4">
    <h2>You're Invited!</h2>
    <p>June 25, 2026</p>
    <p>2:00 PM</p>
  </div>

  <!-- SCENE 5 -->
  <div class="scene" id="scene5">
    <h2>Map</h2>
    <p>🏠 → 🦁 → 📍 Venue</p>
  </div>

  <!-- SCENE 6 -->
  <div class="scene" id="scene6">
    <h2>RSVP</h2>

    <input placeholder="Name">
    <input placeholder="Guests">
    <textarea placeholder="Message"></textarea>

    <button onclick="submitRSVP()">Send RSVP</button>
  </div>

  <script src="./script.js"></script>
</body>
</html>
