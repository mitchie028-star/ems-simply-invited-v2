<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Safari Invitation</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- =========================
       SCREEN 1 - INTRO
  ========================== -->
  <div id="screen1" class="screen">

    <div class="bg"></div>
    <div class="overlay"></div>

    <div class="leaves"></div>

    <h1 class="title">A Wild Adventure Awaits...</h1>

    <audio id="bg-sound" loop>
      <source src="../assets/fanfare_super_mario.mp3" type="audio/mp3">
    </audio>

  </div>

  <!-- =========================
       SCREEN 2 - EXPLORER
  ========================== -->
  <div id="screen2" class="screen hidden">

    <div class="stage">

      <img src="../assets/monkey.png" class="animal monkey">
      <img src="../assets/giraffe.png" class="animal giraffe">
      <img src="../assets/zebra.png" class="animal zebra">
      <img src="../assets/lion.png" class="animal lion">
      <img src="../assets/tiger.png" class="animal tiger">
      <img src="../assets/elephant.png" class="animal elephant">

      <img src="../assets/baby.png" class="baby">

      <h2 class="headline">
        Our Little Explorer<br/>
        is Turning ONE!
      </h2>

      <button class="cta">Join The Adventure →</button>

    </div>

  </div>

  <!-- =========================
       SCREEN 3 - JOURNAL
  ========================== -->
  <div id="screen3" class="screen hidden">

    <div class="journal-stage">

      <div class="journal-bg"></div>

      <div class="trees"></div>

      <div id="journal" class="journal"></div>

      <div id="inviteText" class="invite-text hidden">
        YOU'RE INVITED
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
