<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Safari Invitation</title>

  <link rel="stylesheet" href="style.css">
</head>

<body class="safari">

  <!-- BACKGROUND (ISOLATED) -->
  <div class="safari-bg"></div>
  <div class="safari-overlay"></div>

  <!-- APP -->
  <div class="safari-app">

    <!-- SCENE 1 -->
    <section class="scene active" id="scene1">
      <h1 class="title">A Wild Adventure Awaits...</h1>
    </section>

    <!-- SCENE 2 -->
    <section class="scene" id="scene2">

      <img class="baby" src="/assets/baby.png" />

      <h2 class="text">
        Our Little Explorer<br>is Turning ONE!
      </h2>

      <button class="btn" onclick="next()">
        Join The Adventure
      </button>

    </section>

    <!-- SCENE 3 -->
    <section class="scene" id="scene3">

      <div class="journal" id="journal"></div>

      <div id="inviteText" class="invite hidden">
        YOU’RE INVITED
      </div>

    </section>

    <!-- SCENE 4 -->
    <section class="scene" id="scene4">

      <h2 class="text">Safari Adventure</h2>

      <p>June 25, 2026</p>
      <p>2:00 PM</p>
      <p>The Blue Leaf Events Pavilion</p>

      <button class="btn" onclick="next()">Next</button>

    </section>

    <!-- SCENE 5 -->
    <section class="scene" id="scene5">

      <h2 class="text">Adventure Map</h2>

      <p>🏠 → 🦁 → 📍 Venue</p>

      <button class="btn" onclick="next()">Continue</button>

    </section>

    <!-- SCENE 6 -->
    <section class="scene" id="scene6">

      <h2 class="text">RSVP</h2>

      <input placeholder="Name" />
      <input placeholder="Guests" />
      <textarea placeholder="Message"></textarea>

      <button class="btn" onclick="submitRSVP()">
        Count Me In
      </button>

    </section>

  </div>

  <script src="script.js"></script>

</body>
</html>
