<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Safari Invite</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="safari">

  <!-- BACKGROUND (ONLY ONE LAYER) -->
  <div class="bg"></div>
  <div class="overlay"></div>

  <!-- SCENES -->
  <div id="scene1" class="scene active">
    <h1>A Wild Adventure Awaits...</h1>
    <p>Tap anywhere</p>
  </div>

  <div id="scene2" class="scene">
    <img src="/assets/boy.png" class="baby">
    <h2>Meet the Explorer</h2>
  </div>

  <div id="scene3" class="scene">
    <h2>Safari Friends</h2>

    <div class="animals">
      <img src="/assets/monkey.png">
      <img src="/assets/lion.png">
      <img src="/assets/girraffe.png">
      <img src="/assets/elephant.png">
      <img src="/assets/parrot.png">
    </div>
  </div>

  <div id="scene4" class="scene">
    <h2>You're Invited!</h2>
    <p>June 25, 2026</p>
    <p>2:00 PM</p>
  </div>

  <div id="scene5" class="scene">
    <h2>Adventure Map</h2>
    <p>🏠 → 🦁 → 📍 Venue</p>
  </div>

  <div id="scene6" class="scene">
    <h2>RSVP</h2>

    <input id="name" placeholder="Name">
    <input id="guests" placeholder="Guests">
    <textarea id="message" placeholder="Message"></textarea>

    <button id="submitBtn">Send RSVP</button>
  </div>

  <script src="./script.js"></script>
</body>
</html>
