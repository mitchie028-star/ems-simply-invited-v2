<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Safari Invitation</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ================= LOADER ================= -->
<div id="loader">
  <div class="loader-text">Entering the Safari...</div>
</div>

<!-- ================= SCENES ================= -->

<!-- SCENE 1 -->
<div id="scene1" class="scene">
  <div class="bg bg1"></div>
  <h1 class="title">A Wild Adventure Awaits...</h1>
</div>

<!-- SCENE 2 -->
<div id="scene2" class="scene hidden">
  <div class="bg bg2"></div>

  <img src="../assets/baby.png" class="baby"/>

  <h2 class="headline">Our Little Explorer Turns ONE</h2>

  <button class="cta">Begin Journey</button>
</div>

<!-- SCENE 3 -->
<div id="scene3" class="scene hidden">
  <div class="bg bg3"></div>

  <div id="journal" class="journal"></div>

  <div id="inviteText" class="invite hidden">YOU’RE INVITED</div>
</div>

<!-- SCENE 4 -->
<div id="scene4" class="scene hidden">
  <div class="bg bg4"></div>

  <div class="event">
    <h1>ETHAN'S SAFARI</h1>
    <p>June 25, 2026</p>
    <p>2:00 PM</p>
    <p>The Blue Leaf Pavilion</p>

    <button class="next">View Map</button>
  </div>
</div>

<!-- SCENE 5 -->
<div id="scene5" class="scene hidden">
  <div class="bg bg5"></div>

  <div class="map">
    <h1>Your Safari Path</h1>

    <div class="path">
      🏠 Start → 🦁 Jungle Trail → 📍 Celebration
    </div>

    <button class="rsvp">RSVP Now</button>
  </div>
</div>

<!-- SCENE 6 (RSVP) -->
<div id="scene6" class="scene hidden">
  <div class="rsvpWrap">

    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">

      <h1>RSVP</h1>

      <input name="name" placeholder="Name" required />
      <input name="guests" type="number" placeholder="Guests" required />
      <textarea name="message" placeholder="Message (optional)"></textarea>

      <button type="submit">Send RSVP</button>

    </form>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
