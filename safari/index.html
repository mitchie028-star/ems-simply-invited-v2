<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Safari Invitation</title>

  <link rel="stylesheet" href="style.css">
</head>

<body class="safari">

  <!-- BACKGROUND -->
  <div class="bg"></div>
  <div class="overlay"></div>

  <!-- APP ROOT -->
  <div id="app">

    <!-- SCENE 1 -->
    <section class="scene active" id="scene1">
      <h1>A Wild Adventure Awaits...</h1>
    </section>

    <!-- SCENE 2 -->
    <section class="scene" id="scene2">

      <img class="baby" src="/assets/baby.png" />

      <h2>Our Little Explorer<br>is Turning ONE!</h2>

      <button onclick="next()">Join The Adventure</button>

    </section>

    <!-- SCENE 3 -->
    <section class="scene" id="scene3">

      <div class="journal" id="journal"></div>

      <h2 id="inviteText" style="display:none;">YOU'RE INVITED</h2>

    </section>

    <!-- SCENE 4 -->
    <section class="scene" id="scene4">
      <h2>Safari Adventure</h2>
      <p>June 25, 2026</p>
      <p>2:00 PM</p>
      <p>The Blue Leaf Events Pavilion</p>

      <button onclick="next()">Next</button>
    </section>

    <!-- SCENE 5 -->
    <section class="scene" id="scene5">
      <h2>Adventure Map</h2>
      <p>🏠 → 🦁 → 📍 Venue</p>

      <button onclick="next()">Continue</button>
    </section>

    <!-- SCENE 6 -->
    <section class="scene" id="scene6">
      <h2>RSVP</h2>

      <input placeholder="Name" />
      <input placeholder="Guests" />
      <textarea placeholder="Message"></textarea>

      <button onclick="submit()">Count Me In</button>
    </section>

  </div>

  <script src="script.js"></script>

</body>
</html>
