<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Safari Invitation</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- =========================
       SCREEN 1 - INTRO
  ========================== -->
  <div id="screen1" class="screen">

    <div class="bg"></div>
    <div class="overlay"></div>
    <div class="leaves"></div>

    <h1 class="title">A Wild Adventure Awaits...</h1>

    <audio id="bg-sound" loop>
      <source src="../assets/fanfare_super_mario.mp3" type="audio/mp3">
    </audio>

  </div>

  <!-- =========================
       SCREEN 2 - EXPLORER
  ========================== -->
  <div id="screen2" class="screen hidden">

    <div class="stage">

      <img src="../assets/monkey.png" class="animal monkey">
      <img src="../assets/giraffe.png" class="animal giraffe">
      <img src="../assets/zebra.png" class="animal zebra">
      <img src="../assets/lion.png" class="animal lion">
      <img src="../assets/tiger.png" class="animal tiger">
      <img src="../assets/elephant.png" class="animal elephant">

      <img src="../assets/baby.png" class="baby">

      <h2 class="headline">
        Our Little Explorer<br/>
        is Turning ONE!
      </h2>

      <button class="cta">Join The Adventure →</button>

    </div>

  </div>

  <!-- =========================
       SCREEN 3 - JOURNAL
  ========================== -->
  <div id="screen3" class="screen hidden">

    <div class="journal-stage">

      <div class="journal-bg"></div>
      <div class="trees"></div>

      <div id="journal" class="journal"></div>

      <div id="inviteText" class="invite-text hidden">
        YOU'RE INVITED
      </div>

    </div>

  </div>

  <!-- =========================
       SCREEN 4 - EVENT DETAILS
  ========================== -->
  <div id="screen4" class="screen hidden">

    <div class="event-bg"></div>
    <div class="event-overlay"></div>

    <div class="event-content">

      <h1 class="event-title">
        ETHAN'S<br/>
        WILD ONE<br/>
        SAFARI ADVENTURE
      </h1>

      <div class="event-details">
        <p>Saturday</p>
        <p>June 25, 2026</p>
        <br/>
        <p>2:00 PM</p>
        <br/>
        <p>The Blue Leaf Events Pavilion</p>
      </div>

      <button class="next-btn">
        View Adventure Map →
      </button>

    </div>

  </div>

  <!-- =========================
       SCREEN 5 - MAP
  ========================== -->
  <div id="screen5" class="screen hidden">

    <div class="map-bg"></div>
    <div class="map-overlay"></div>

    <div class="map-content">

      <h1 class="map-title">Your Safari Journey</h1>

      <div class="map-path">

        <div class="map-point">🏠 Home</div>

        <div class="map-line">↓</div>

        <div class="map-point">🦁 Jungle Trail</div>

        <div class="map-line">↓</div>

        <div class="map-point">📍 Party Venue</div>

      </div>

      <button class="rsvp-btn">
        Final Stop: RSVP →
      </button>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
