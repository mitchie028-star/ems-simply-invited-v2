<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Safari Adventure Invitation</title>

  <link rel="stylesheet" href="style.css">
</head>

<body class="safari">

  <!-- =========================
       BACKGROUND LAYERS
  ========================== -->

  <div class="safari-bg"></div>
  <div class="safari-overlay"></div>

  <!-- =========================
       LOADER (OPTIONAL CINEMATIC ENTRY)
  ========================== -->

  <div id="loader">
    <div class="loader-text">Loading Safari Adventure...</div>
  </div>

  <!-- =========================
       SCENE 1 - INTRO
  ========================== -->

  <section id="scene1" class="safari-screen">
    <h1 class="safari-title">
      A Wild Adventure Awaits...
    </h1>
  </section>

  <!-- =========================
       SCENE 2 - HERO BABY
  ========================== -->

  <section id="scene2" class="safari-screen hidden">

    <div class="safari-animals">

      <img src="/assets/monkey.png" class="animal monkey" />
      <img src="/assets/giraffe.png" class="animal giraffe" />
      <img src="/assets/lion.png" class="animal lion" />
      <img src="/assets/elephant.png" class="animal elephant" />
      <img src="/assets/parrot.png" class="animal parrot" />

    </div>

    <img src="/assets/baby.png" class="safari-baby" />

    <div class="safari-text">
      Our Little Explorer<br>
      is Turning ONE!
    </div>

    <button class="safari-btn safari-cta">
      Join The Adventure →
    </button>

  </section>

  <!-- =========================
       SCENE 3 - JOURNAL
  ========================== -->

  <section id="scene3" class="safari-screen hidden">

    <div id="journal" class="journal-book"></div>

    <div id="inviteText" class="safari-text hidden">
      YOU’RE INVITED
    </div>

  </section>

  <!-- =========================
       SCENE 4 - DETAILS
  ========================== -->

  <section id="scene4" class="safari-screen hidden">

    <h2 class="safari-text">Safari Adventure</h2>

    <div class="journal-book" style="height:auto; padding:20px;">
      <p>Saturday</p>
      <p>June 25, 2026</p>
      <p>2:00 PM</p>
      <p>The Blue Leaf Events Pavilion</p>
    </div>

    <button class="safari-btn safari-next">
      Next →
    </button>

  </section>

  <!-- =========================
       SCENE 5 - MAP
  ========================== -->

  <section id="scene5" class="safari-screen hidden">

    <h2 class="safari-text">Adventure Map</h2>

    <div class="journal-book" style="height:auto; padding:20px;">

      <p>🏠 Start</p>
      <p>↓</p>
      <p>🦁 Jungle Trail</p>
      <p>↓</p>
      <p>📍 Party Venue</p>

    </div>

    <button class="safari-btn safari-next">
      Continue →
    </button>

  </section>

  <!-- =========================
       SCENE 6 - RSVP
  ========================== -->

  <section id="scene6" class="safari-screen hidden">

    <h2 class="safari-text">RSVP</h2>

    <form class="rsvp-form safari-rsvp">

      <input type="text" placeholder="Name" />
      <input type="number" placeholder="Guests" />
      <textarea placeholder="Message"></textarea>

      <button type="button">
        Count Me In!
      </button>

    </form>

  </section>

  <!-- =========================
       SCRIPT
  ========================== -->

  <script src="script.js"></script>

</body>
</html>
